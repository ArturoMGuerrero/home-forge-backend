spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlserver}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/casaflow}
    username: ${DB_USERNAME:casaflow}
    password: ${DB_PASSWORD:casaflow}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 96MB
server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://172.27.9.148:5174}
  uploads:
    directory: ${UPLOADS_DIRECTORY:uploads}
